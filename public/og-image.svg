<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <line x1="60" y1="0" x2="0" y2="0" stroke="rgba(255,255,255,0.028)" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="60" stroke="rgba(255,255,255,0.028)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#000000"/>

  <!-- Grid -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Central glow -->
  <ellipse cx="600" cy="270" rx="680" ry="420" fill="url(#glow)"/>

  <!-- App icon -->
  <rect x="530" y="88" width="140" height="140" rx="34" fill="#0d0d0d" stroke="rgba(249,115,22,0.35)" stroke-width="1.5"/>
  <rect x="534" y="92" width="132" height="132" rx="32" fill="url(#iconGrad)"/>
  <!-- "GO" text in icon -->
  <text x="600" y="178" font-family="Arial Black, Arial, sans-serif" font-size="64" font-weight="900" fill="#ffffff" text-anchor="middle" font-style="italic">GO</text>

  <!-- CrewiGO wordmark -->
  <text x="600" y="314" font-family="Arial Black, Arial, sans-serif" font-size="76" font-weight="900" fill="#ffffff" text-anchor="middle">Crewi<tspan fill="#F97316" font-style="italic">GO</tspan></text>

  <!-- Tagline -->
  <text x="600" y="360" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="8">ROAM TOGETHER.</text>

  <!-- Horizontal rule -->
  <line x1="350" y1="396" x2="850" y2="396" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Feature pills -->
  <!-- Planning -->
  <rect x="258" y="416" width="148" height="38" rx="19" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.22)" stroke-width="1"/>
  <text x="332" y="440" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.7)" text-anchor="middle">📅 Planning</text>

  <!-- Budget -->
  <rect x="424" y="416" width="130" height="38" rx="19" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.22)" stroke-width="1"/>
  <text x="489" y="440" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.7)" text-anchor="middle">💰 Budget</text>

  <!-- Chat -->
  <rect x="572" y="416" width="110" height="38" rx="19" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.22)" stroke-width="1"/>
  <text x="627" y="440" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.7)" text-anchor="middle">💬 Chat</text>

  <!-- Photos -->
  <rect x="700" y="416" width="130" height="38" rx="19" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.22)" stroke-width="1"/>
  <text x="765" y="440" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.7)" text-anchor="middle">📸 Photos</text>

  <!-- Bottom info -->
  <text x="600" y="530" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.28)" text-anchor="middle">crewigo.app · Sans App Store · Gratuit · iOS &amp; Android</text>

  <!-- Border frame (subtle) -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="rgba(249,115,22,0.06)" stroke-width="2"/>
</svg>
