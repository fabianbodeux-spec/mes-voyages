<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrewGo — Hors ligne</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #F97316; --accent-dark: #EA6A10; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 24px;
      text-align: center;
    }

    .logo-wrap {
      position: relative;
      width: 88px;
      height: 88px;
    }

    .logo-halo {
      position: absolute;
      inset: -28px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(249,115,22,0.38) 0%, rgba(249,115,22,0.14) 40%, transparent 70%);
      filter: blur(12px);
    }

    .logo-square {
      position: relative;
      width: 88px;
      height: 88px;
      border-radius: 20px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo-square img {
      width: 72px;
      height: 72px;
      object-fit: contain;
    }

    .wordmark {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .wordmark span { color: var(--accent); }

    .icon-offline {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(249,115,22,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-offline svg { color: var(--accent); }

    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
    }

    p {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.55);
      max-width: 280px;
      line-height: 1.55;
    }

    button {
      margin-top: 8px;
      padding: 13px 32px;
      border-radius: 14px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:active { opacity: 0.75; }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <div class="logo-halo"></div>
    <div class="logo-square">
      <img src="/logo-icon.png" alt="CrewGo">
    </div>
  </div>

  <div class="wordmark">Crew<span>Go</span></div>

  <div class="icon-offline">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
  </div>

  <div>
    <h1>Vous êtes hors ligne</h1>
    <p style="margin-top:8px">Vérifiez votre connexion et réessayez pour accéder à vos voyages.</p>
  </div>

  <button onclick="location.reload()">Réessayer</button>

</body>
</html>
